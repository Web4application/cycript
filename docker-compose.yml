version: '3.8'
services:
  android-emulator:
    image: budtmo/docker-android:emulator_11.0
    privileged: true
    ports:
      - "4723:4723" # Appium
      - "5555:5555" # ADB
    environment:
      - DEVICE=Samsung Galaxy S10
  
  test-runner:
    build: .
    volumes:
      - ./tests:/tests
    depends_on:
      - android-emulator
    command: python3 /tests/ui_test.py
